<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Native App Repository</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: #f5f5f7;
        color: #1d1d1f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        text-align: center;
        padding: 20px;
      }
      .container {
        background: white;
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        max-width: 500px;
      }
      h1 { font-size: 24px; font-weight: 800; margin-bottom: 16px; }
      p { color: #86868b; line-height: 1.6; margin-bottom: 24px; }
      .badge {
        display: inline-block;
        padding: 6px 12px;
        background: #e8f5e9;
        color: #2e7d32;
        border-radius: 12px;
        font-size: 12px;
        font-weight: bold;
        margin: 4px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🚀 已完全轉移至原生開發</h1>
      <p>
        此專案已完全放棄 React 與 Web 前端架構。所有的 <code>.ts</code> 與 <code>.tsx</code> 檔案皆已刪除。<br><br>
        請前往專案的 <code>/native</code> 資料夾查看自動生成的 Android (Java)、iOS (Swift) 與 Backend (C#) 原生程式碼。
      </p>
      <div>
        <span class="badge">Android (Java)</span>
        <span class="badge">iOS (Swift)</span>
        <span class="badge">Backend (C#)</span>
      </div>
    </div>
  </body>
</html>
